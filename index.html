<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bug Tracker</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: Arial, sans-serif;
      background: #f4f4f4;
      padding: 40px;
    }

    h1 { color: #333; margin-bottom: 20px; }

    .form-box {
      background: white;
      padding: 24px;
      border-radius: 10px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      max-width: 500px;
      margin-bottom: 20px;
    }

    input, select {
      width: 100%;
      padding: 10px;
      margin-bottom: 12px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 14px;
    }

    button {
      background: #e74c3c;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 6px;
      font-size: 14px;
      cursor: pointer;
      width: 100%;
    }

    button:hover { background: #c0392b; }

    .filters {
      max-width: 500px;
      display: flex;
      gap: 10px;
      margin-bottom: 16px;
    }

    .filter-btn {
      flex: 1;
      background: white;
      color: #333;
      border: 1px solid #ddd;
      padding: 8px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      width: auto;
    }

    .filter-btn.active {
      background: #e74c3c;
      color: white;
      border-color: #e74c3c;
    }

    .bug-count {
      font-size: 13px;
      color: #888;
      margin-bottom: 12px;
      max-width: 500px;
    }

    .bug-list { max-width: 500px; }

    .bug-item {
      background: white;
      padding: 16px;
      border-radius: 10px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      margin-bottom: 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
    }

    .bug-item.fixed {
      opacity: 0.5;
      text-decoration: line-through;
    }

    .bug-title {
      font-size: 15px;
      font-weight: bold;
      color: #333;
      flex: 1;
    }

    .bug-severity {
      font-size: 12px;
      padding: 4px 10px;
      border-radius: 20px;
      font-weight: 500;
    }

    .low { background: #d5f5e3; color: #1e8449; }
    .medium { background: #fef9e7; color: #d4ac0d; }
    .high { background: #fdecea; color: #e74c3c; }

    .actions { display: flex; gap: 6px; }

    .btn-fix {
      background: #27ae60;
      color: white;
      border: none;
      padding: 6px 12px;
      border-radius: 6px;
      font-size: 12px;
      cursor: pointer;
      width: auto;
    }

    .btn-fix:hover { background: #1e8449; }

    .btn-delete {
      background: #95a5a6;
      color: white;
      border: none;
      padding: 6px 12px;
      border-radius: 6px;
      font-size: 12px;
      cursor: pointer;
      width: auto;
    }

    .btn-delete:hover { background: #7f8c8d; }

    .empty {
      text-align: center;
      color: #aaa;
      font-size: 14px;
      padding: 30px;
    }
  </style>
</head>
<body>

  <h1>🐛 Bug Tracker</h1>

  <div class="form-box">
    <h2 style="margin-bottom:16px; font-size:16px;">Report a Bug</h2>
    <input type="text" id="bugTitle" placeholder="Bug title..." />
    <select id="bugSeverity">
      <option value="">Select severity</option>
      <option value="low">Low</option>
      <option value="medium">Medium</option>
      <option value="high">High</option>
    </select>
    <button onclick="addBug()">Add Bug</button>
  </div>

  <div class="filters">
    <button class="filter-btn active" onclick="filterBugs('all', this)">All</button>
    <button class="filter-btn" onclick="filterBugs('open', this)">Open</button>
    <button class="filter-btn" onclick="filterBugs('fixed', this)">Fixed</button>
    <button class="filter-btn" onclick="filterBugs('high', this)">High Priority</button>
  </div>

  <div class="bug-count" id="bugCount">No bugs reported yet</div>
  <div class="bug-list" id="bugList"></div>

  <script>
    let bugs = [];
    let currentFilter = 'all';

    function addBug() {
      const title = document.getElementById('bugTitle').value.trim();
      const severity = document.getElementById('bugSeverity').value;

      if (!title || !severity) {
        alert('Please enter a bug title and severity!');
        return;
      }

      const bug = {
        id: Date.now(),
        title,
        severity,
        fixed: false
      };

      bugs.push(bug);
      renderBugs();

      document.getElementById('bugTitle').value = '';
      document.getElementById('bugSeverity').value = '';
    }

    function fixBug(id) {
      bugs = bugs.map(bug =>
        bug.id === id ? { ...bug, fixed: !bug.fixed } : bug
      );
      renderBugs();
    }

    function deleteBug(id) {
      bugs = bugs.filter(bug => bug.id !== id);
      renderBugs();
    }

    function filterBugs(filter, btn) {
      currentFilter = filter;
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      renderBugs();
    }

    function renderBugs() {
      const list = document.getElementById('bugList');
      const count = document.getElementById('bugCount');

      const fixed = bugs.filter(b => b.fixed).length;
      const open = bugs.filter(b => !b.fixed).length;
      count.textContent = `Total: ${bugs.length} | Open: ${open} | Fixed: ${fixed}`;

      let filtered = bugs;
      if (currentFilter === 'open') filtered = bugs.filter(b => !b.fixed);
      if (currentFilter === 'fixed') filtered = bugs.filter(b => b.fixed);
      if (currentFilter === 'high') filtered = bugs.filter(b => b.severity === 'high');

      if (filtered.length === 0) {
        list.innerHTML = '<div class="empty">No bugs found!</div>';
        return;
      }

      list.innerHTML = filtered.map(bug => `
        <div class="bug-item ${bug.fixed ? 'fixed' : ''}">
          <span class="bug-title">${bug.title}</span>
          <span class="bug-severity ${bug.severity}">${bug.severity}</span>
          <div class="actions">
            <button class="btn-fix" onclick="fixBug(${bug.id})">
              ${bug.fixed ? 'Reopen' : 'Fix'}
            </button>
            <button class="btn-delete" onclick="deleteBug(${bug.id})">Delete</button>
          </div>
        </div>
      `).join('');
    }
  </script>

</body>
</html>
